{% extends "base.html" %}
{% block title %}留言文件管理{% endblock %}
{% block content %}
<h4>留言文件管理 <span class="badge bg-warning text-dark">Admin</span></h4>
<p class="text-muted">留言文件存储在服务器 <code>messages/</code> 目录，可在此删除。</p>
<table class="table table-striped">
  <thead><tr><th>文件名</th><th>操作</th></tr></thead>
  <tbody>
    {% for fname in files %}
    <tr>
      <td><code>{{ fname }}</code></td>
      <td>
        <form method="POST" action="/admin/messages/delete" style="display:inline">
          {% if csrf_token is defined %}
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
          {% endif %}
          <!-- VULN: filename passed directly to subprocess rm -->
          <input type="hidden" name="filename" value="{{ fname }}">
          <button type="submit" class="btn btn-sm btn-danger">删除文件</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
